apiVersion: v1
kind: Namespace
metadata:
  name: kubepanel
---
# =============================================================================
# Calico IPPool for KubePanel Dashboard - Used for trusted SMTP access
# Pods with annotation cni.projectcalico.org/ipv4pools: '["kubepanel-dashboard-pool"]'
# will get IPs from this pool, which is trusted by Postfix mynetworks
# =============================================================================
apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: kubepanel-dashboard-pool
spec:
  cidr: 10.245.0.0/24
  ipipMode: Never
  natOutgoing: true
  nodeSelector: all()
  vxlanMode: Always
---
# =============================================================================
# Backup CRD - Manages backup records for domains
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backups.kubepanel.io
  annotations:
    kubepanel.io/version: "v1alpha1"
    kubepanel.io/description: "Backup resource for KubePanel domain backups"
spec:
  group: kubepanel.io
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    singular: backup
    shortNames:
      - bak
  scope: Namespaced  # Lives in domain namespace (dom-example-com)
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domainName
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Started
          type: string
          jsonPath: .status.startedAt
        - name: Completed
          type: string
          jsonPath: .status.completedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - domainName
              properties:
                domainName:
                  type: string
                  description: "Domain name this backup belongs to (e.g., example.com)"
                  maxLength: 253
                type:
                  type: string
                  description: "Backup trigger type"
                  enum:
                    - scheduled
                    - manual
                  default: manual
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: "Current phase of the backup"
                  enum:
                    - Pending
                    - Running
                    - Completed
                    - Failed
                message:
                  type: string
                  description: "Human-readable status message"
                  maxLength: 1024
                volumeSnapshotName:
                  type: string
                  description: "Name of the VolumeSnapshot created for filesystem backup"
                databaseBackupPath:
                  type: string
                  description: "Path to the mariabackup archive on the backup PVC"
                sizeBytes:
                  type: integer
                  format: int64
                  description: "Total size of the backup in bytes"
                startedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when backup started"
                completedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when backup completed"
                retentionExpiresAt:
                  type: string
                  format: date-time
                  description: "Timestamp when this backup should be deleted (7 days from creation)"
---
# =============================================================================
# Restore CRD - Manages domain restore operations
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: restores.kubepanel.io
  annotations:
    kubepanel.io/version: "v1alpha1"
    kubepanel.io/description: "Restore resource for KubePanel domain restores"
spec:
  group: kubepanel.io
  names:
    kind: Restore
    listKind: RestoreList
    plural: restores
    singular: restore
    shortNames:
      - rst
  scope: Namespaced  # Lives in domain namespace (dom-example-com)
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domainName
        - name: Backup
          type: string
          jsonPath: .spec.backupName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Started
          type: string
          jsonPath: .status.startedAt
        - name: Completed
          type: string
          jsonPath: .status.completedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - domainName
              properties:
                domainName:
                  type: string
                  description: "Domain name to restore (e.g., example.com)"
                  maxLength: 253
                backupName:
                  type: string
                  description: "Name of the Backup CR to restore from (optional for uploaded restores)"
                  maxLength: 253
                restoreType:
                  type: string
                  description: "Type of restore: snapshot (from VolumeSnapshot) or uploaded (from tar.gz archive)"
                  enum:
                    - snapshot
                    - uploaded
                  default: snapshot
                volumeSnapshotName:
                  type: string
                  description: "Name of the VolumeSnapshot to restore (required for snapshot restores)"
                  maxLength: 253
                databaseBackupPath:
                  type: string
                  description: "Path to the database backup file (from Backup status)"
                  maxLength: 1024
                uploadedArchivePath:
                  type: string
                  description: "Path to uploaded tar.gz archive on backup PVC (required for uploaded restores)"
                  maxLength: 1024
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: "Current phase of the restore"
                  enum:
                    - Pending
                    - Running
                    - Completed
                    - Failed
                message:
                  type: string
                  description: "Human-readable status message"
                  maxLength: 1024
                startedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when restore started"
                completedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when restore completed"
---
# =============================================================================
# Domain CRD - Manages web hosting domains
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: domains.kubepanel.io
  annotations:
    kubepanel.io/version: "v1alpha1"
    kubepanel.io/description: "Domain resource for KubePanel web hosting"
spec:
  group: kubepanel.io
  names:
    kind: Domain
    listKind: DomainList
    plural: domains
    singular: domain
    shortNames:
      - dom
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domainName
        - name: Storage
          type: string
          jsonPath: .spec.resources.storage
        - name: Workload
          type: string
          jsonPath: .spec.workload.type
        - name: Version
          type: string
          jsonPath: .spec.workload.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - domainName
                - resources
                - workload
              x-kubernetes-validations:
                - rule: "self.domainName == oldSelf.domainName"
                  message: "domainName is immutable after creation"
              properties:
                domainName:
                  type: string
                  description: "Primary domain name (e.g., example.com)"
                  pattern: "^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z]{2,})+$"
                  maxLength: 253

                title:
                  type: string
                  description: "Human-readable title for the domain"
                  maxLength: 255

                aliases:
                  type: array
                  description: "Additional domain names pointing to this site, optionally with email config"
                  maxItems: 100
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        description: "Alias domain name"
                        pattern: "^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z]{2,})+$"
                        maxLength: 253
                      email:
                        type: object
                        description: "Email configuration for this alias"
                        properties:
                          enabled:
                            type: boolean
                            description: "Enable email for this alias domain"
                          dkimSelector:
                            type: string
                            description: "DKIM selector (default: default)"
                            pattern: "^[a-zA-Z0-9_-]+$"
                            maxLength: 63
                          dkimSecretRef:
                            type: object
                            description: "Reference to DKIM secret for this alias"
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                            required:
                              - name
                              - namespace
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map

                preferredNodes:
                  type: array
                  description: "List of node names where this domain should preferably run"
                  items:
                    type: string
                  x-kubernetes-list-type: set

                suspended:
                  type: boolean
                  description: "If true, the domain workloads are scaled to zero"
                  default: false

                timezone:
                  type: string
                  description: "Timezone for the domain containers (e.g., Europe/Budapest, America/New_York)"
                  default: "UTC"
                  maxLength: 63

                workload:
                  type: object
                  description: "Application workload configuration"
                  required:
                    - type
                    - version
                    - image
                  properties:
                    type:
                      type: string
                      description: "Workload type slug (php, python, nodejs, django, etc.)"
                      maxLength: 50
                    version:
                      type: string
                      description: "Version string (8.2, 3.11, 20, etc.)"
                      maxLength: 50
                    image:
                      type: string
                      description: "Full container image URL"
                      maxLength: 500
                    port:
                      type: integer
                      description: "App container port (default: 9000)"
                      minimum: 1
                      maximum: 65535
                      default: 9000
                    proxyMode:
                      type: string
                      description: "How nginx proxies to app (fastcgi/http/uwsgi)"
                      enum:
                        - fastcgi
                        - http
                        - uwsgi
                      default: fastcgi
                    command:
                      type: array
                      description: "Custom container command (overrides image CMD)"
                      items:
                        type: string
                    args:
                      type: array
                      description: "Custom container args"
                      items:
                        type: string
                    env:
                      type: array
                      description: "Environment variables for app container"
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            description: "Environment variable name"
                          value:
                            type: string
                            description: "Environment variable value"
                    settings:
                      type: object
                      description: "Type-specific runtime settings"
                      x-kubernetes-preserve-unknown-fields: true
                    customConfig:
                      type: string
                      description: "Custom config (php.ini, gunicorn.conf, etc.)"
                      maxLength: 10000

                wordpress:
                  type: object
                  description: "WordPress-specific settings"
                  properties:
                    preinstall:
                      type: boolean
                      description: "Pre-install WordPress on domain creation (default: false)"
                      default: false

                resources:
                  type: object
                  description: "Resource allocation for the domain"
                  required:
                    - storage
                    - limits
                  properties:
                    storage:
                      type: string
                      description: "PVC storage size (e.g., 5Gi)"
                      pattern: "^[0-9]+Gi$"

                    requests:
                      type: object
                      description: "Minimum guaranteed resources (optional)"
                      properties:
                        cpu:
                          type: string
                          description: "CPU request (e.g., 50m)"
                          pattern: "^[0-9]+m$"
                        memory:
                          type: string
                          description: "Memory request (e.g., 64Mi)"
                          pattern: "^[0-9]+Mi$"

                    limits:
                      type: object
                      description: "Maximum resource limits"
                      required:
                        - cpu
                        - memory
                      properties:
                        cpu:
                          type: string
                          description: "CPU limit (e.g., 500m)"
                          pattern: "^[0-9]+m$"
                        memory:
                          type: string
                          description: "Memory limit (e.g., 256Mi)"
                          pattern: "^[0-9]+Mi$"

                webserver:
                  type: object
                  description: "Nginx configuration (optional)"
                  properties:
                    documentRoot:
                      type: string
                      description: "Document root (default: /var/www/html)"
                      pattern: "^[a-zA-Z0-9/_-]+$"
                      maxLength: 255
                    clientMaxBodySize:
                      type: string
                      description: "Maximum upload size (default: 64m)"
                      pattern: "^[0-9]+[mMgG]$"
                    sslRedirect:
                      type: boolean
                      description: "Redirect HTTP to HTTPS (default: true)"
                    wwwRedirect:
                      type: string
                      description: "Redirect www to non-www or vice versa"
                      enum:
                        - "none"
                        - "www-to-root"
                        - "root-to-www"
                    customConfig:
                      type: string
                      description: "Custom nginx directives"
                      maxLength: 10000
                    cache:
                      type: object
                      description: "FastCGI cache configuration"
                      properties:
                        enabled:
                          type: boolean
                          description: "Enable FastCGI caching (default: false)"
                        size:
                          type: string
                          description: "Maximum cache size (default: 512Mi)"
                          pattern: "^[0-9]+(Mi|Gi)$"
                        inactiveTime:
                          type: string
                          description: "Remove cached items not accessed within this time (default: 60m)"
                          pattern: "^[0-9]+(m|h|d)$"
                        validTime:
                          type: string
                          description: "Cache validity duration for 200/301/302 responses (default: 10m)"
                          pattern: "^[0-9]+(m|h|d)$"
                        bypassUris:
                          type: array
                          description: "Additional URI patterns to bypass cache"
                          items:
                            type: string
                            maxLength: 255

                database:
                  type: object
                  description: "MariaDB database configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "Create a database for this domain (default: true)"

                email:
                  type: object
                  description: "Email configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "Enable email for this domain (default: false)"
                    dkimSelector:
                      type: string
                      description: "DKIM selector (default: default)"
                      pattern: "^[a-zA-Z0-9_-]+$"
                      maxLength: 63
                    dkimSecretRef:
                      type: object
                      description: "Reference to DKIM secret created by Django"
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required: [name, namespace]

                dns:
                  type: object
                  description: "DNS configuration for Cloudflare"
                  properties:
                    enabled:
                      type: boolean
                      description: "Enable DNS management for this domain"
                      default: false
                    credentialSecretRef:
                      type: object
                      description: "Reference to Cloudflare API token secret"
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required: [name, namespace]
                    zone:
                      type: object
                      description: "DNS zone configuration"
                      properties:
                        name:
                          type: string
                          description: "Zone name (usually same as domain name)"
                          maxLength: 253
                        create:
                          type: boolean
                          description: "Create zone if not exists"
                          default: true
                    autoCreateRecords:
                      type: boolean
                      description: "Auto-create standard DNS records (A, MX, SPF, DKIM, DMARC)"
                      default: true
                    records:
                      type: array
                      description: "DNS records to create/manage"
                      items:
                        type: object
                        required: [type, name, content]
                        properties:
                          type:
                            type: string
                            enum: ["A", "AAAA", "CNAME", "TXT", "MX", "NS", "SRV"]
                          name:
                            type: string
                            description: "Record name (@ for root)"
                            maxLength: 253
                          content:
                            type: string
                            description: "Record content/value"
                            maxLength: 4096
                          ttl:
                            type: integer
                            description: "TTL in seconds (1 = auto)"
                            default: 1
                          proxied:
                            type: boolean
                            description: "Enable Cloudflare proxy"
                            default: false
                          priority:
                            type: integer
                            description: "Priority for MX/SRV records"
                          recordId:
                            type: string
                            description: "Cloudflare record ID (used for updates, copied from status)"

                sftp:
                  type: object
                  description: "SFTP access configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "Enable SFTP access (default: true)"
                    type:
                      type: string
                      description: "SFTP container type: standard (SFTP only) or sshgit (SSH + Git)"
                      enum: ["standard", "sshgit"]
                      default: "standard"

                redis:
                  type: object
                  description: "Redis sidecar configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "Enable Redis sidecar container"
                      default: false

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: "Current phase of the domain"
                  enum:
                    - Pending
                    - Provisioning
                    - Ready
                    - Degraded
                    - Suspended
                    - Failed
                    - Terminating
                message:
                  type: string
                  description: "Human-readable status message"
                namespace:
                  type: string
                  description: "Namespace created for this domain"
                observedGeneration:
                  type: integer
                  format: int64
                  description: "Last observed generation of the spec"
                sftp:
                  type: object
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                      minimum: 30000
                      maximum: 32767
                    username:
                      type: string
                    passwordSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                      required: [name, namespace, key]
                    publicKeySecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                      required: [name, namespace, key]
                database:
                  type: object
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                    name:
                      type: string
                    username:
                      type: string
                    passwordSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                      required: [name, namespace, key]
                email:
                  type: object
                  properties:
                    dkimSelector:
                      type: string
                    dkimPublicKey:
                      type: string
                    dkimPrivateKeySecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                      required: [name, namespace, key]
                    dkimDnsRecord:
                      type: string
                dns:
                  type: object
                  description: "DNS management status"
                  properties:
                    phase:
                      type: string
                      description: "Current phase of DNS management"
                      enum:
                        - Pending
                        - Provisioning
                        - Ready
                        - Failed
                    message:
                      type: string
                      description: "Human-readable status message"
                      maxLength: 1024
                    zone:
                      type: object
                      description: "Zone information"
                      properties:
                        id:
                          type: string
                          description: "Cloudflare zone ID"
                        name:
                          type: string
                          description: "Zone name"
                    records:
                      type: array
                      description: "Status of managed DNS records"
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                          name:
                            type: string
                          content:
                            type: string
                          recordId:
                            type: string
                            description: "Cloudflare record ID"
                          status:
                            type: string
                            enum: [Pending, Ready, Failed]
                          error:
                            type: string
                            description: "Error message if failed"
                endpoints:
                  type: object
                  properties:
                    http:
                      type: string
                    https:
                      type: string
                    phpMyAdmin:
                      type: string
                conditions:
                  type: array
                  description: "Detailed status conditions"
                  items:
                    type: object
                    required: [type, status, lastTransitionTime]
                    properties:
                      type:
                        type: string
                        enum:
                          - NamespaceReady
                          - PVCReady
                          - ConfigMapReady
                          - DeploymentReady
                          - ServiceReady
                          - SFTPServiceReady
                          - IngressReady
                          - CertificateReady
                          - DatabaseReady
                          - DatabaseProvisioned
                          - SFTPReady
                          - DKIMReady
                          - BackupPVCReady
                          - DNSReady
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                        maxLength: 256
                      message:
                        type: string
                        maxLength: 1024
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
---
# =============================================================================
# DNSZone CRD - Manages DNS zones in Cloudflare
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnszones.kubepanel.io
  annotations:
    kubepanel.io/version: "v1alpha1"
    kubepanel.io/description: "DNS zone resource for KubePanel Cloudflare DNS management"
spec:
  group: kubepanel.io
  names:
    kind: DNSZone
    listKind: DNSZoneList
    plural: dnszones
    singular: dnszone
    shortNames:
      - dz
  scope: Cluster  # Cluster-scoped, same as Domain CR
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Zone
          type: string
          jsonPath: .spec.zoneName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Records
          type: integer
          jsonPath: .status.recordCount
        - name: Last Sync
          type: string
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - zoneName
                - credentialSecretRef
              properties:
                zoneName:
                  type: string
                  description: "DNS zone name (e.g., example.com)"
                  maxLength: 253

                credentialSecretRef:
                  type: object
                  description: "Reference to Cloudflare API token secret"
                  required: [name, namespace]
                  properties:
                    name:
                      type: string
                      description: "Secret name containing Cloudflare API token"
                    namespace:
                      type: string
                      description: "Namespace of the secret"

                records:
                  type: array
                  description: "DNS records to manage - ALL records including auto-generated ones"
                  items:
                    type: object
                    required: [type, name, content]
                    properties:
                      type:
                        type: string
                        description: "DNS record type"
                        enum: ["A", "AAAA", "CNAME", "TXT", "MX", "NS", "SRV", "CAA"]
                      name:
                        type: string
                        description: "Record name (@ for root, or subdomain)"
                        maxLength: 253
                      content:
                        type: string
                        description: "Record content/value"
                        maxLength: 4096
                      ttl:
                        type: integer
                        description: "TTL in seconds (1 = auto)"
                        default: 1
                        minimum: 1
                      proxied:
                        type: boolean
                        description: "Enable Cloudflare proxy (only for A/AAAA/CNAME)"
                        default: false
                      priority:
                        type: integer
                        description: "Priority for MX/SRV records"
                        minimum: 0
                        maximum: 65535
                      recordId:
                        type: string
                        description: "Cloudflare record ID - written by operator after creation"
                        maxLength: 64

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                  description: "Current phase of DNS zone management"
                  enum:
                    - Pending
                    - Syncing
                    - Ready
                    - Failed
                message:
                  type: string
                  description: "Human-readable status message"
                  maxLength: 1024
                zoneId:
                  type: string
                  description: "Cloudflare zone ID"
                  maxLength: 64
                recordCount:
                  type: integer
                  description: "Number of synced records"
                records:
                  type: array
                  description: "Mirror of synced records (for status display)"
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      name:
                        type: string
                      content:
                        type: string
                      recordId:
                        type: string
                      synced:
                        type: boolean
                        description: "True if successfully synced to Cloudflare"
                      error:
                        type: string
                        description: "Error message if sync failed"
                nameservers:
                  type: array
                  description: "Authoritative nameservers for the zone (from CloudFlare)"
                  items:
                    type: string
                lastSyncedAt:
                  type: string
                  format: date-time
                  description: "Timestamp of last successful sync"
---
# =============================================================================
# GlobalWAF CRD - Web Application Firewall rules on ingress-nginx
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: globalwafs.kubepanel.io
  annotations:
    kubepanel.io/version: "v1alpha1"
