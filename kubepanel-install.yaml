# =============================================================================
# Backup ServiceAccount and RBAC
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubepanel-backup
  namespace: kubepanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepanel-backup
rules:
  # Permissions to manage VolumeSnapshots
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Permissions to update Backup CR status
  - apiGroups: ["kubepanel.io"]
    resources: ["backups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubepanel.io"]
    resources: ["backups/status"]
    verbs: ["get", "patch", "update"]
  # Permissions to read secrets (for MariaDB credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Permissions to read PVCs (for backup operations)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepanel-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepanel-backup
subjects:
  - kind: ServiceAccount
    name: kubepanel-backup
    namespace: kubepanel
---
# =============================================================================
# Nightly Backup CronJob and RBAC
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubepanel-nightly-backup
  namespace: kubepanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepanel-nightly-backup
rules:
  # Permissions to list Domain CRs
  - apiGroups: ["kubepanel.io"]
    resources: ["domains"]
    verbs: ["get", "list"]
  # Permissions to manage Backup CRs (create for nightly, delete for cleanup)
  - apiGroups: ["kubepanel.io"]
    resources: ["backups"]
    verbs: ["create", "get", "list", "delete"]
  # Permissions to list namespaces (for cleanup job)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepanel-nightly-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepanel-nightly-backup
subjects:
  - kind: ServiceAccount
    name: kubepanel-nightly-backup
    namespace: kubepanel
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubepanel-nightly-backup
  namespace: kubepanel
  labels:
    app.kubernetes.io/name: kubepanel-nightly-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: kubepanel
spec:
  schedule: "0 2 * * *"  # Run at 2:00 AM every day
  timeZone: "UTC"
  concurrencyPolicy: Forbid  # Don't start new job if previous is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400  # Clean up after 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kubepanel-nightly-backup
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: kubepanel-nightly-backup
          restartPolicy: Never
          containers:
            - name: nightly-backup
              image: docker.io/kubepanel/backup:v1.0
              imagePullPolicy: Always
              command: ["/nightly-backup.sh"]
              env:
                - name: BACKUP_DELAY
                  value: "60"  # 60 seconds between each domain backup
---
# Cleanup CronJob - runs daily to delete expired backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubepanel-backup-cleanup
  namespace: kubepanel
  labels:
    app.kubernetes.io/name: kubepanel-backup-cleanup
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: kubepanel
spec:
  schedule: "0 4 * * *"  # Run at 4:00 AM every day (after nightly backups complete)
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kubepanel-backup-cleanup
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: kubepanel-nightly-backup  # Reuse same SA
          restartPolicy: Never
          containers:
            - name: cleanup
              image: docker.io/kubepanel/backup:v1.0
              imagePullPolicy: Always
              command: ["/cleanup.sh"]
---
# =============================================================================
# KubePanel Operator - manages Domain CRs
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubepanel-operator
  namespace: kubepanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepanel-operator
rules:
  # Domain CRs - full control
  - apiGroups: ["kubepanel.io"]
    resources: ["domains", "domains/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # DNSZone CRs - full control (including spec patching for recordId)
  - apiGroups: ["kubepanel.io"]
    resources: ["dnszones", "dnszones/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # GlobalWAF CRs - full control
  - apiGroups: ["kubepanel.io"]
    resources: ["globalwafs", "globalwafs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # GlobalL3Firewall CRs - full control
  - apiGroups: ["kubepanel.io"]
    resources: ["globall3firewalls", "globall3firewalls/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SMTPFirewall CRs - full control
  - apiGroups: ["kubepanel.io"]
    resources: ["smtpfirewalls", "smtpfirewalls/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Calico GlobalNetworkPolicy - for L3 firewall
  - apiGroups: ["crd.projectcalico.org"]
    resources: ["globalnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Backup CRs - full control
  - apiGroups: ["kubepanel.io"]
    resources: ["backups", "backups/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaces - create/delete for domains
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Core resources in domain namespaces
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingress
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # VolumeSnapshots for backups
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Jobs for backup/restore
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # ServiceAccounts and RBAC in domain namespaces
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for logging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Pods for status checking
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepanel-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepanel-operator
subjects:
  - kind: ServiceAccount
    name: kubepanel-operator
    namespace: kubepanel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubepanel-operator
  namespace: kubepanel
  labels:
    app.kubernetes.io/name: kubepanel-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/managed-by: kubepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubepanel-operator
  template:
    metadata:
      labels:
        app: kubepanel-operator
        app.kubernetes.io/name: kubepanel-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: kubepanel-operator
      containers:
        - name: operator
          image: docker.io/kubepanel/operator:v1.0
          imagePullPolicy: Always
          env:
            - name: MARIADB_HOST
              value: "mariadb.kubepanel.svc.cluster.local"
            - name: MARIADB_PORT
              value: "3306"
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-auth
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
