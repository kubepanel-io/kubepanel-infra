# =============================================================================
# GeoIP Setup for Ingress-Nginx - Patches DaemonSet to add GeoIP database
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: geoip-patcher
  namespace: kubepanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: geoip-patcher-role
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: geoip-patcher-binding
subjects:
  - kind: ServiceAccount
    name: geoip-patcher
    namespace: kubepanel
roleRef:
  kind: ClusterRole
  name: geoip-patcher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: geoip-ingress-patcher
  namespace: kubepanel
  annotations:
    kubepanel.io/description: "Patches ingress-nginx DaemonSet to add GeoIP database init container"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: geoip-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Checking if ingress-nginx already has geoip-db volume..."
              if kubectl get daemonset nginx-ingress-microk8s-controller -n ingress -o jsonpath='{.spec.template.spec.volumes[*].name}' | grep -q geoip-db; then
                echo "GeoIP volume already exists, skipping patch."
                exit 0
              fi

              echo "Patching ingress-nginx DaemonSet for GeoIP support..."
              kubectl patch daemonset nginx-ingress-microk8s-controller -n ingress --type='strategic' -p='{
                "spec": {
                  "template": {
                    "spec": {
                      "initContainers": [{
                        "name": "geoip-downloader",
                        "image": "curlimages/curl:latest",
                        "command": ["sh", "-c", "echo Downloading GeoIP database... && curl -fsSL https://raw.githubusercontent.com/kubepanel-io/kubepanel/refs/heads/main/GeoLite2-Country.mmdb -o /geoip/GeoLite2-Country.mmdb && echo Download complete."],
                        "volumeMounts": [{"name": "geoip-db", "mountPath": "/geoip"}]
                      }],
                      "volumes": [{"name": "geoip-db", "emptyDir": {}}],
                      "containers": [{
                        "name": "nginx-ingress-microk8s",
                        "volumeMounts": [{"name": "geoip-db", "mountPath": "/etc/ingress-controller/geoip", "readOnly": true}]
                      }]
                    }
                  }
                }
              }'

              if [ $? -eq 0 ]; then
                echo "Patch applied successfully!"
              else
                echo "Patch failed!"
                exit 1
              fi
---
