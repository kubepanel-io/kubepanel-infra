# =============================================================================
# rspamd - SMTP rate limiting and content inspection
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rspamd-config
  namespace: kubepanel
data:
  # Worker proxy configuration - milter mode
  worker-proxy.inc: |
    type = "rspamd_proxy";
    bind_socket = "*:11332";
    milter = true;
    timeout = 120s;
    upstream "local" {
      default = yes;
      self_scan = yes;
    }
  # Rate limiting configuration (rspamd 3.x syntax)
  # Uses Redis for rate limit counters only (not for custom rates)
  ratelimit.conf: |
    enabled = true;
    backend = "redis";

    # Custom per-user rate limits from file map
    custom_keywords = "/etc/rspamd/local.d/custom_ratelimit.lua";

    rates {
      # Per authenticated user / sender (default for users without custom limits)
      user = {
        selector = 'user.lower';
        bucket = {
          rate = "100 / 1h";
          burst = 20;
        };
      };
      # Per recipient (to detect mass mailing)
      to = {
        selector = 'rcpts:addr.take_n(5)';
        bucket = {
          rate = "200 / 1h";
          burst = 30;
        };
      };
      # Per sender address rate limit
      from = {
        selector = 'from:addr.lower';
        bucket = {
          rate = "100 / 1h";
          burst = 20;
        };
      };
    }
  # Custom Lua script for per-user rate limits from file map
  custom_ratelimit.lua: |
    -- Per-user rate limit lookup from file map
    -- Map format: user@example.com 50 / 1h
    -- Managed by SMTPFirewall CRD

    local rspamd_logger = require "rspamd_logger"

    -- Load user rate limits map (hash type: key -> value)
    local user_rates_map = rspamd_config:add_map({
      url = '/etc/rspamd/local.d/user_ratelimits.map',
      type = 'hash',
      description = 'Per-user rate limits'
    })

    local custom_keywords = {}

    custom_keywords.user_custom = function(task)
      local user = task:get_user()
      if not user then
        local from = task:get_from('smtp')
        if from and from[1] then
          user = from[1].addr
        end
      end

      if not user then
        return nil
      end

      user = user:lower()

      -- Lookup in map (synchronous - map is in memory)
      if user_rates_map then
        local custom_rate = user_rates_map:get_key(user)

        if custom_rate then
          local bucket_key = "rl_custom_" .. user
          rspamd_logger.infox(task, "custom rate for %s: %s", user, custom_rate)
          return bucket_key, custom_rate
        end
      end

      return nil
    end

    return custom_keywords
  # Redis backend configuration (for rate limit counters)
  redis.conf: |
    servers = "redis.kubepanel.svc.cluster.local:6379";
  # Multimap module for sender/domain/IP blocking
  # Uses file-based maps managed by SMTPFirewall CRD
  multimap.conf: |
    # Block specific senders (full email address)
    BLOCKED_SENDER {
      type = "from";
      map = "/etc/rspamd/local.d/blocked_senders.map";
      action = "reject";
      message = "Sender blocked by administrator";
    }

    # Block entire domains
    BLOCKED_DOMAIN {
      type = "from";
      filter = "email:domain";
      map = "/etc/rspamd/local.d/blocked_domains.map";
      action = "reject";
      message = "Sender domain blocked by administrator";
    }

    # Block specific IPs
    BLOCKED_IP {
      type = "ip";
      map = "/etc/rspamd/local.d/blocked_ips.map";
      action = "reject";
      message = "IP blocked by administrator";
    }
  # Map files for blocking (managed by SMTPFirewall CRD operator)
  blocked_senders.map: |
    # Blocked sender email addresses (one per line)
    # Managed by SMTPFirewall CRD
  blocked_domains.map: |
    # Blocked sender domains (one per line)
    # Managed by SMTPFirewall CRD
  blocked_ips.map: |
    # Blocked IP addresses (one per line)
    # Managed by SMTPFirewall CRD
  user_ratelimits.map: |
    # Per-user rate limits (format: user@example.com 50 / 1h)
    # Managed by SMTPFirewall CRD
  # History logging configuration
  history_redis.conf: |
    servers = "redis.kubepanel.svc.cluster.local:6379";
    key_prefix = "rs_history_global";
    nrows = 1000;
    compress = true;
  # Worker controller configuration - Web UI and API
  worker-controller.inc: |
    bind_socket = "*:11334";
    # Allow unauthenticated access from cluster network
    secure_ip = "10.0.0.0/8";
    secure_ip = "172.16.0.0/12";
    secure_ip = "192.168.0.0/16";
    # Also allow localhost
    secure_ip = "127.0.0.0/8";
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rspamd-pvc
  namespace: kubepanel
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: linstor-sc
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rspamd
  namespace: kubepanel
  labels:
    app.kubernetes.io/name: rspamd
    app.kubernetes.io/component: smtp-firewall
    app.kubernetes.io/managed-by: kubepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rspamd
  template:
    metadata:
      labels:
        app: rspamd
    spec:
      # Pod affinity for zero-downtime rolling updates with RWO PVC
      # Ensures new pod schedules on same node as existing pod
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rspamd
                topologyKey: kubernetes.io/hostname
      containers:
        - name: rspamd
          image: rspamd/rspamd:latest
          ports:
            - containerPort: 11332
              name: milter
            - containerPort: 11333
              name: worker
            - containerPort: 11334
              name: webui
          volumeMounts:
            - name: config
              mountPath: /etc/rspamd/local.d/worker-proxy.inc
              subPath: worker-proxy.inc
            - name: config
              mountPath: /etc/rspamd/local.d/ratelimit.conf
              subPath: ratelimit.conf
            - name: config
              mountPath: /etc/rspamd/local.d/redis.conf
              subPath: redis.conf
            - name: config
              mountPath: /etc/rspamd/local.d/multimap.conf
              subPath: multimap.conf
            - name: config
              mountPath: /etc/rspamd/local.d/history_redis.conf
              subPath: history_redis.conf
            - name: config
              mountPath: /etc/rspamd/local.d/worker-controller.inc
              subPath: worker-controller.inc
            - name: config
              mountPath: /etc/rspamd/local.d/custom_ratelimit.lua
              subPath: custom_ratelimit.lua
            - name: config
              mountPath: /etc/rspamd/local.d/blocked_senders.map
              subPath: blocked_senders.map
            - name: config
              mountPath: /etc/rspamd/local.d/blocked_domains.map
              subPath: blocked_domains.map
            - name: config
              mountPath: /etc/rspamd/local.d/blocked_ips.map
              subPath: blocked_ips.map
            - name: config
              mountPath: /etc/rspamd/local.d/user_ratelimits.map
              subPath: user_ratelimits.map
            - name: data
              mountPath: /var/lib/rspamd
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 11332
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 11332
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: rspamd-config
        - name: data
          persistentVolumeClaim:
            claimName: rspamd-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rspamd
  namespace: kubepanel
spec:
  selector:
    app: rspamd
  ports:
    - name: milter
      port: 11332
      targetPort: 11332
    - name: worker
      port: 11333
      targetPort: 11333
    - name: webui
      port: 11334
      targetPort: 11334
---
