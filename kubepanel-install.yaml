apiVersion: v1
kind: ConfigMap
metadata:
  name: smtp-conf
  namespace: kubepanel
data:
  main.cf: |-
    smtpd_banner = $myhostname ESMTP $mail_name (Ubuntu)
    biff = no
    append_dot_mydomain = no
    readme_directory = no
    compatibility_level = 3.6
    smtpd_tls_cert_file=/etc/ssl/kubepanel/tls.crt
    smtpd_tls_key_file=/etc/ssl/kubepanel/tls.key
    smtpd_tls_security_level=may
    smtpd_tls_auth_only = yes
    smtp_tls_CApath=/etc/ssl/certs
    smtp_tls_security_level=may
    smtp_tls_session_cache_database = btree:${data_directory}/smtp_scache
    smtpd_relay_restrictions = permit_mynetworks permit_sasl_authenticated defer_unauth_destination
    smtpd_recipient_restrictions = permit_mynetworks permit_sasl_authenticated reject_unauth_destination
    myhostname = <KUBEPANEL_DOMAIN>
    mydomain = <KUBEPANEL_DOMAIN>
    myorigin = $mydomain
    alias_maps = hash:/etc/aliases
    alias_database = hash:/etc/aliases
    mydestination = $myhostname, localhost, localhost.localdomain, , localhost
    relayhost =
    mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128 10.245.0.0/24
    mailbox_size_limit = 0
    recipient_delimiter = +
    inet_interfaces = all
    inet_protocols = all
    smtpd_milters = inet:rspamd.kubepanel.svc.cluster.local:11332, inet:opendkim.kubepanel.svc.cluster.local:8891
    non_smtpd_milters = inet:rspamd.kubepanel.svc.cluster.local:11332, inet:opendkim.kubepanel.svc.cluster.local:8891
    milter_default_action = accept
    milter_protocol = 6
    maillog_file = /var/log/postfix.log
    virtual_mailbox_domains = mysql:/etc/postfix/mysql-virtual-mailbox-domains.cf
    virtual_mailbox_maps = mysql:/etc/postfix/mysql-virtual-mailbox-maps.cf
    virtual_alias_maps = mysql:/etc/postfix/mysql-virtual-alias-maps.cf
    virtual_transport = lmtp:unix:private/dovecot-lmtp
    smtpd_sasl_type = dovecot
    smtpd_sasl_path = private/auth
    smtpd_sasl_auth_enable = yes
    smtpd_sasl_security_options = noanonymous
    smtpd_sasl_local_domain = $myhostname
  mysql-virtual-mailbox-maps.cf: |-
    user = kubepanel
    password = <MARIADB_ROOT_PASSWORD>
    hosts = mariadb.kubepanel.svc.cluster.local
    dbname = kubepanel
    query = SELECT CONCAT(d.domain_name, '/', mu.local_part, '/') AS maildir FROM dashboard_mailuser mu JOIN dashboard_domain d ON mu.domain_id = d.id WHERE mu.active = 1 AND mu.domain_alias_id IS NULL AND CONCAT(mu.local_part, '@', d.domain_name) = '%s' UNION SELECT CONCAT(da.alias_name, '/', mu.local_part, '/') AS maildir FROM dashboard_mailuser mu JOIN dashboard_domainalias da ON mu.domain_alias_id = da.id WHERE mu.active = 1 AND mu.domain_alias_id IS NOT NULL AND CONCAT(mu.local_part, '@', da.alias_name) = '%s'
  mysql-virtual-alias-maps.cf: |-
    user = kubepanel
    password = <MARIADB_ROOT_PASSWORD>
    hosts = mariadb.kubepanel.svc.cluster.local
    dbname = kubepanel
    query = SELECT dashboard_mailalias.destination
            FROM dashboard_mailalias
            WHERE dashboard_mailalias.active = 1
              AND dashboard_mailalias.source = '%s'
  mysql-virtual-mailbox-domains.cf: |-
    user = kubepanel
    password = <MARIADB_ROOT_PASSWORD>
    hosts = mariadb.kubepanel.svc.cluster.local
    dbname = kubepanel
    query = SELECT dashboard_domain.domain_name FROM dashboard_domain WHERE dashboard_domain.domain_name='%s' UNION SELECT dashboard_domainalias.alias_name FROM dashboard_domainalias WHERE dashboard_domainalias.email_enabled = 1 AND dashboard_domainalias.alias_name='%s'
  dovecot-sql.conf.ext: |-
    driver = mysql
    connect = host=mariadb.kubepanel.svc.cluster.local dbname=kubepanel user=kubepanel password=<MARIADB_ROOT_PASSWORD>
    default_pass_scheme = SHA512-CRYPT
    password_query = SELECT \
        CONCAT(mu.local_part, '@', d.domain_name) AS user, \
        mu.password AS password, \
        '/var/mail/vmail/' AS userdb_home, \
        'vmail' AS userdb_uid, \
        'vmail' AS userdb_gid, \
        CONCAT('maildir:/var/mail/vmail/', d.domain_name, '/', mu.local_part, '/') AS userdb_mail \
    FROM dashboard_mailuser mu \
    JOIN dashboard_domain d ON mu.domain_id = d.id \
    WHERE mu.active = 1 AND mu.domain_alias_id IS NULL \
      AND CONCAT(mu.local_part, '@', d.domain_name) = '%u' \
    UNION SELECT \
        CONCAT(mu.local_part, '@', da.alias_name) AS user, \
        mu.password AS password, \
        '/var/mail/vmail/' AS userdb_home, \
        'vmail' AS userdb_uid, \
        'vmail' AS userdb_gid, \
        CONCAT('maildir:/var/mail/vmail/', da.alias_name, '/', mu.local_part, '/') AS userdb_mail \
    FROM dashboard_mailuser mu \
    JOIN dashboard_domainalias da ON mu.domain_alias_id = da.id \
    WHERE mu.active = 1 AND mu.domain_alias_id IS NOT NULL \
      AND CONCAT(mu.local_part, '@', da.alias_name) = '%u'
  10-mail.conf: |-
    mail_location = maildir:/var/mail/vmail/%d/%n
    passdb {
      driver = sql
      args = /etc/dovecot/dovecot-sql.conf.ext
    }
    userdb {
      driver = static
      args = uid=vmail gid=vmail home=/var/mail/vmail/%d/%n
    }
    namespace inbox {
      inbox = yes
    }
    mail_privileged_group = mail
    protocol !indexer-worker {
    }
---
