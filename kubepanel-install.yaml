apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # You must replace this email address with your own.
    # Let's Encrypt will use this to contact you about expiring
    # certificates, and issues related to your account.
    email: <DJANGO_SUPERUSER_EMAIL>
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      # Secret resource that will be used to store the account's private key.
      name: letsencrypt-account-key
    # Add a single challenge solver, HTTP01 using nginx
    solvers:
    - http01:
        ingress:
          ingressClassName: public
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp
  namespace: kubepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtp
  template:
    metadata:
      labels:
        app: smtp
    spec:
      affinity:
        # Pod affinity for zero-downtime rolling updates with RWO PVC
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: smtp
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: mx0
                operator: In
                values:
                - "true"
            weight: 1
      containers:
       - name: smtp
         image: docker.io/kubepanel/smtp:v1.0
         imagePullPolicy: Always
         ports:
         - containerPort: 25
         env:
         - name: MARIADB_ROOT_PASSWORD
           value: "<MARIADB_ROOT_PASSWORD>"
         volumeMounts:
         - name: mail-tls
           mountPath: /etc/ssl/kubepanel
           readOnly: true
         - mountPath: /var/spool/postfix
           name: postfix-queue
         - mountPath: /var/mail/vmail
           name: smtp-data
         - name: smtp-conf
           mountPath: /etc/postfix/main.cf
           subPath: main.cf
         - name: smtp-conf
           mountPath: /etc/postfix/mysql-virtual-alias-maps.cf
           subPath: mysql-virtual-alias-maps.cf
         - name: smtp-conf
           mountPath: /etc/postfix/mysql-virtual-mailbox-domains.cf
           subPath: mysql-virtual-mailbox-domains.cf
         - name: smtp-conf
           mountPath: /etc/postfix/mysql-virtual-mailbox-maps.cf
           subPath: mysql-virtual-mailbox-maps.cf
         - name: smtp-conf
           mountPath: /etc/dovecot/dovecot-sql.conf.ext
           subPath: dovecot-sql.conf.ext
         - name: smtp-conf
           mountPath: /etc/dovecot/conf.d/10-mail.conf
           subPath: 10-mail.conf
         livenessProbe:
           tcpSocket:
             port: 25
           initialDelaySeconds: 30
           periodSeconds: 30
           timeoutSeconds: 5
           failureThreshold: 3
         readinessProbe:
           tcpSocket:
             port: 25
           initialDelaySeconds: 10
           periodSeconds: 10
           timeoutSeconds: 5
           failureThreshold: 3
      volumes:
      - name: smtp-data
        persistentVolumeClaim:
          claimName: smtp-pvc
      - name: postfix-queue
        persistentVolumeClaim:
          claimName: postfix-queue-pvc
      - configMap:
          name: smtp-conf
        name: smtp-conf
      - name: mail-tls
        secret:
          secretName: kubepanel-cert
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smtp-internal-conf
  namespace: kubepanel
data:
  main.cf: |
    # Simple SMTP relay for system emails (no MySQL dependencies)
    smtpd_banner = $myhostname ESMTP
    biff = no
    append_dot_mydomain = no
    compatibility_level = 3.6

    # Only allow kubepanel-pool pods to send
    mynetworks = 127.0.0.0/8 10.100.0.0/24

    # Relay restrictions - only mynetworks can relay
    smtpd_relay_restrictions = permit_mynetworks reject
    smtpd_recipient_restrictions = permit_mynetworks reject

    # Basic settings
    myhostname = smtp-internal.kubepanel.svc.cluster.local
    mydomain = kubepanel.svc.cluster.local
    myorigin = $mydomain
    mydestination =
    relayhost =

    inet_interfaces = all
    inet_protocols = ipv4

    # Disable all virtual/local delivery - relay only
    local_recipient_maps =
    local_transport = error:no local delivery

    # Logging
    maillog_file = /dev/stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp-internal
  namespace: kubepanel
  labels:
    app.kubernetes.io/name: smtp-internal
    app.kubernetes.io/component: system-mailer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtp-internal
  template:
    metadata:
      labels:
        app: smtp-internal
    spec:
      containers:
      - name: postfix
        image: docker.io/kubepanel/smtp:v1.0
        ports:
        - containerPort: 25
        env:
        - name: ALLOWED_SENDER_DOMAINS
          value: ""
        - name: RELAYHOST
          value: ""
        volumeMounts:
        - name: config
          mountPath: /etc/postfix/main.cf
          subPath: main.cf
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          tcpSocket:
            port: 25
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 25
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          defaultMode: 420
          name: smtp-internal-conf
---
apiVersion: v1
