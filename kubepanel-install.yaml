# =============================================================================
# KubePanel Dashboard ServiceAccount and RBAC
# =============================================================================
# Used by kubepanel deployment and metrics CronJobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubepanel
  namespace: kubepanel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepanel-dashboard
rules:
  # Domain CRs - read/write for dashboard
  - apiGroups: ["kubepanel.io"]
    resources: ["domains", "domains/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # DNSZone CRs
  - apiGroups: ["kubepanel.io"]
    resources: ["dnszones", "dnszones/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # GlobalWAF CRs
  - apiGroups: ["kubepanel.io"]
    resources: ["globalwafs", "globalwafs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # GlobalL3Firewall CRs
  - apiGroups: ["kubepanel.io"]
    resources: ["globall3firewalls", "globall3firewalls/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SMTPFirewall CRs
  - apiGroups: ["kubepanel.io"]
    resources: ["smtpfirewalls", "smtpfirewalls/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods - for status checking and log reading
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Secrets - for reading domain credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Namespaces - for listing domain namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # VolumeSnapshots - for backup listing
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch"]
  # Nodes - for node management views
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  # Nodes/drain - for draining nodes (eviction)
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  # Metrics API - for CPU/memory metrics collection
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepanel-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepanel-dashboard
subjects:
  - kind: ServiceAccount
    name: kubepanel
    namespace: kubepanel
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubepanel
  namespace: kubepanel
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: linstor-sc  # This must match the PV's storageClassName
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubepanel
  namespace: kubepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubepanel
  template:
    metadata:
      labels:
        app: kubepanel
      annotations:
        # Use reserved IP pool for trusted SMTP access (permit_mynetworks)
        cni.projectcalico.org/ipv4pools: '["kubepanel-dashboard-pool"]'
    spec:
      serviceAccountName: kubepanel
      # Pod affinity for zero-downtime rolling updates with RWO PVC
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: kubepanel
                topologyKey: kubernetes.io/hostname
      volumes:
      - name: kubepanel
        persistentVolumeClaim:
          claimName: kubepanel
      initContainers:
      - name: wait-for-mariadb
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Waiting for MariaDB to be ready...";
            until nc -z mariadb.kubepanel.svc.cluster.local 3306; do
              echo "MariaDB not ready, sleeping...";
              sleep 2;
            done
            echo "MariaDB is up!"
      - name: init
        image: docker.io/kubepanel/kubepanel_init:v1.0
        env:
        - name: DJANGO_SUPERUSER_EMAIL
          value: "<DJANGO_SUPERUSER_EMAIL>"
        - name: DJANGO_SUPERUSER_USERNAME
          value: "<DJANGO_SUPERUSER_USERNAME>"
        - name: DJANGO_SUPERUSER_PASSWORD
          value: "<DJANGO_SUPERUSER_PASSWORD>"
        - name: KUBEPANEL_DOMAIN
          value: "<KUBEPANEL_DOMAIN>"
        - name: KUBEPANEL_VERSION
          value: "v1.0.0"
        - name: DBNAME
          value: "kubepanel"
        - name: MARIADB_ROOT_PASSWORD
          value: "<MARIADB_ROOT_PASSWORD>"
        - name: DBNAME_RC
          value: "roundcube"
        - name: MARIADB_ROOT_PASSWORD_RC
          value: "<MARIADB_ROOT_PASSWORD_RC>"
        imagePullPolicy: Always
        volumeMounts:
        - name: kubepanel
          mountPath: /kubepanel
      containers:
      - name: dashboard
        image: docker.io/kubepanel/dashboard:v1.0
        imagePullPolicy: Always
        env:
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kubepanel-secrets
              key: django-secret-key
        - name: KUBEPANEL_ALERT_EMAIL
          value: "<KUBEPANEL_ALERT_EMAIL>"
        ports:
        - containerPort: 8000
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: kubepanel
          mountPath: /kubepanel
      # Metrics collector sidecar - collects CPU/memory/HTTP metrics every 5 minutes
      - name: metrics-collector
        image: docker.io/kubepanel/dashboard:v1.0
        imagePullPolicy: Always
        command: ["python", "/kubepanel/manage.py", "metrics_collector"]
        volumeMounts:
        - name: kubepanel
          mountPath: /kubepanel
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      # Health collector sidecar - checks Linstor, mail queue, MariaDB every 5 minutes
      - name: health-collector
        image: docker.io/kubepanel/dashboard:v1.0
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          while true; do
            python /kubepanel/manage.py collect_health
            sleep 300
          done
        env:
        - name: KUBEPANEL_ALERT_EMAIL
          value: "<KUBEPANEL_ALERT_EMAIL>"
        volumeMounts:
        - name: kubepanel
          mountPath: /kubepanel
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: kubepanel
  namespace: kubepanel
spec:
  type: ClusterIP
  selector:
    app: kubepanel
  ports:
  - name: django
    port: 8000
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: kubepanel
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: public
  tls:
  - hosts:
    - <KUBEPANEL_DOMAIN>
    secretName: kubepanel-cert
  rules:
  - host: "<KUBEPANEL_DOMAIN>"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: kubepanel
            port:
              number: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendkim
  namespace: kubepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opendkim
  template:
    metadata:
      labels:
        app: opendkim
    spec:
      securityContext:
        fsGroup: 999  # opendkim group GID
      initContainers:
      # Copy keys from K8s secret to emptyDir with correct permissions
      # OpenDKIM requires keys directory to not be world-readable
      - name: fix-permissions
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          mkdir -p /etc/opendkim/keys
          chmod 700 /etc/opendkim/keys
          for f in /secrets/*; do
            if [ -f "$f" ]; then
              cp "$f" /etc/opendkim/keys/
              chmod 600 /etc/opendkim/keys/$(basename "$f")
            fi
          done
          chown -R 999:999 /etc/opendkim/keys
          echo "DKIM keys prepared: $(ls -la /etc/opendkim/keys)"
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: dkim-keys-secret
          mountPath: /secrets
          readOnly: true
        - name: dkim-keys-dir
          mountPath: /etc/opendkim/keys
      containers:
      - name: opendkim
        image: docker.io/kubepanel/opendkim:v1.0
        imagePullPolicy: Always
        volumeMounts:
        - name: dkim-keytable
          mountPath: "/etc/opendkim/KeyTable"
          subPath: "KeyTable"
        - name: dkim-signingtable
          mountPath: "/etc/opendkim/SigningTable"
          subPath: "SigningTable"
        - name: dkim-keys-dir
          mountPath: "/etc/opendkim/keys"
          readOnly: true
        ports:
        - containerPort: 8891
        livenessProbe:
          tcpSocket:
            port: 8891
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8891
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: dkim-keytable
        configMap:
          name: dkim-keytable
      - name: dkim-signingtable
        configMap:
          name: dkim-signingtable
      - name: dkim-keys-secret
        secret:
          secretName: dkim-keys
          defaultMode: 0400
      - name: dkim-keys-dir
        emptyDir: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: dkim-keys
  namespace: kubepanel
  labels:
    app.kubernetes.io/managed-by: kubepanel-operator
    app.kubernetes.io/component: dkim
type: Opaque
data: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dkim-keytable
  namespace: kubepanel
data:
  KeyTable: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dkim-signingtable
  namespace: kubepanel
data:
  SigningTable: ""
---
apiVersion: v1
kind: Service
metadata:
  name: opendkim
  namespace: kubepanel
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: opendkim
    port: 8891
    protocol: TCP
    targetPort: 8891
  selector:
    app: opendkim
  sessionAffinity: None
  type: ClusterIP
status:
  loadBalancer: {}
